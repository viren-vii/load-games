name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish via Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # OIDC token used by npm CLI to authenticate against the registry via the
      # Trusted Publisher configured on each @load-games/* package
      # (Publisher: GitHub Actions, repo: viren-vii/load-games, workflow: release.yml).
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # OIDC publishing requires npm >= 11.5.1. Node 22 ships with npm 10.x.
      # Keeping this step so OIDC works as soon as token is removed.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — npm CLI uses OIDC via ACTIONS_ID_TOKEN_REQUEST_*
          # injected automatically by the runner (id-token: write permission above).
