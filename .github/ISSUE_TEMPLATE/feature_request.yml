name: Feature request
description: Suggest a new game, engine capability, or API improvement.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Keep proposals scoped — one feature per issue.

  - type: dropdown
    id: kind
    attributes:
      label: Kind of change
      options:
        - New game
        - New engine / core API
        - React wrapper change
        - Tooling / DX
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case isn't covered today? What does the workaround look like?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch the API or behavior. Pseudocode welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they fall short.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues / discussions for similar requests.
          required: true
        - label: This belongs in the core monorepo (not as a separate package).
          required: false
