<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" role="img" aria-label="Breakout game preview">
  <rect width="320" height="320" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="319" height="319" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.45"/>
  <!-- bricks (5 rows × 8 cols, alternating accent/primary, fading alpha) -->
  <!-- row 0 (alpha 1.0, accent) -->
  <g fill="#22c55e">
    <rect x="4" y="36" width="35" height="14"/><rect x="43" y="36" width="35" height="14"/><rect x="82" y="36" width="35" height="14"/><rect x="121" y="36" width="35" height="14"/><rect x="160" y="36" width="35" height="14"/><rect x="199" y="36" width="35" height="14"/><rect x="238" y="36" width="35" height="14"/><rect x="277" y="36" width="35" height="14"/>
  </g>
  <!-- row 1 (alpha 0.9, primary) -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="4" y="54" width="35" height="14"/><rect x="43" y="54" width="35" height="14"/><rect x="82" y="54" width="35" height="14"/><rect x="121" y="54" width="35" height="14"/><rect x="160" y="54" width="35" height="14"/><rect x="199" y="54" width="35" height="14"/><rect x="238" y="54" width="35" height="14"/><rect x="277" y="54" width="35" height="14"/>
  </g>
  <!-- row 2 (alpha 0.75, accent) -->
  <g fill="#22c55e" opacity="0.75">
    <rect x="4" y="72" width="35" height="14"/><rect x="43" y="72" width="35" height="14"/><rect x="82" y="72" width="35" height="14"/><rect x="121" y="72" width="35" height="14"/><rect x="160" y="72" width="35" height="14"/><rect x="199" y="72" width="35" height="14"/><rect x="238" y="72" width="35" height="14"/><rect x="277" y="72" width="35" height="14"/>
  </g>
  <!-- row 3 (alpha 0.6, primary; missing few — "in play") -->
  <g fill="#ffffff" opacity="0.6">
    <rect x="4" y="90" width="35" height="14"/><rect x="43" y="90" width="35" height="14"/><rect x="82" y="90" width="35" height="14"/><rect x="160" y="90" width="35" height="14"/><rect x="238" y="90" width="35" height="14"/><rect x="277" y="90" width="35" height="14"/>
  </g>
  <!-- row 4 (alpha 0.45, accent; sparse) -->
  <g fill="#22c55e" opacity="0.45">
    <rect x="4" y="108" width="35" height="14"/><rect x="121" y="108" width="35" height="14"/><rect x="199" y="108" width="35" height="14"/>
  </g>
  <!-- paddle -->
  <rect x="125" y="302" width="70" height="10" rx="3" fill="#ffffff"/>
  <!-- ball -->
  <circle cx="160" cy="240" r="7" fill="#22c55e"/>
  <!-- hud -->
  <text x="8" y="20" font-family="ui-monospace, monospace" font-size="12" fill="#ffffff">14</text>
  <text x="160" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#ffffff">LVL 1</text>
  <text x="312" y="20" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#ffffff">♥♥♥</text>
</svg>
